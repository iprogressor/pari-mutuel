name: Deploy dApp to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Pages deployment needs these; everything else stays read-only.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deployments at once; a newer push supersedes an older run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build dApp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        env:
          # optional: raises the Toncenter read rate limit; fine to be empty
          TONCENTER_TESTNET_API_KEY: ${{ secrets.TONCENTER_TESTNET_API_KEY }}
          TONCENTER_MAINNET_API_KEY: ${{ secrets.TONCENTER_MAINNET_API_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: app/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
