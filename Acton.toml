[package]
name = "pari-mutuel"
description = "A TON blockchain project"
version = "0.1.0"
license = "MIT"

[toolchain]
acton = "1.1.0"

[contracts.PredictionPool]
display-name = "PredictionPool"
src = "contracts/src/PredictionPool.tolk"
depends = []

[test]

[fmt]
width = 100
ignore = []

[scripts]
deploy-pool = "acton script contracts/scripts/deployPool.tolk"
deploy-pool-testnet = "acton script contracts/scripts/deployPool.tolk --net testnet"

[import-mappings]
acton = ".acton"
contracts = "contracts/src"
gen = "gen"
tests = "contracts/tests"
wrappers = "contracts/wrappers"

# Check full Acton.toml reference and all available keys:
# https://ton-blockchain.github.io/acton/docs/acton-toml
